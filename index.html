<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playsis 2502 注册系统</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --err: #ff3b30; --succ: #34c759; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h2 { text-align: center; color: #1c1c1e; margin: 0 0 25px 0; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 5px; padding-left: 4px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d6; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: all 0.2s; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .hint { font-size: 11px; color: #aeaeb2; margin-top: 5px; display: block; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        button:disabled { background-color: #c7c7cc; cursor: wait; }
        #status { text-align: center; margin-top: 15px; font-size: 13px; line-height: 1.5; min-height: 40px; word-break: break-all; padding: 10px; border-radius: 8px; }
        .success { background: #e8f5e9; color: var(--succ); }
        .error { background: #ffebee; color: var(--err); }
        .loading { color: var(--primary); font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>用户注册</h2>
    <form id="regForm">
        <div class="form-group">
            <label>用户 ID (8位数字)</label>
            <input type="text" id="reguid" maxlength="8" placeholder="例如: 21114098" required oninput="value=value.replace(/[^\d]/g,'')">
            <span class="hint">必须正好 8 位纯数字</span>
        </div>
        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="regusername" placeholder="请输入昵称" required>
        </div>
        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regpassword" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmPass" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" id="submitBtn">立即提交注册</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const form = document.getElementById('regForm');
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    // 备用中转服务器列表，防止单个失效
    const proxies = [
        "https://cors-anywhere.azm.workers.dev/",
        "https://api.allorigins.win/get?url="
    ];

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        const data = {
            reguid: document.getElementById('reguid').value,
            regusername: document.getElementById('regusername').value,
            regpassword: document.getElementById('regpassword').value,
            confirm: document.getElementById('confirmPass').value
        };

        if (data.reguid.length !== 8) return showMsg("ID必须是8位", "error");
        if (data.regpassword !== data.confirm) return showMsg("密码不一致", "error");

        btn.disabled = true;
        showMsg("正在尝试连接服务器...", "loading");

        const adminUid = "21114044";
        const adminPass = "huang2006?";
        const apiBase = "https://api.eachother.work/PlaysisService/RegisterByAdminRawApi";
        
        const query = `uid=${adminUid}&password=${encodeURIComponent(adminPass)}&reguid=${data.reguid}&regpassword=${encodeURIComponent(data.regpassword)}&regusername=${encodeURIComponent(data.regusername)}`;
        const fullTarget = `${apiBase}?${query}`;

        // 尝试第一个代理
        let success = await tryFetch(proxies[0] + fullTarget);
        
        // 如果失败，尝试第二个代理（allorigins 需要特殊处理返回格式）
        if (!success) {
            showMsg("切换备用通道中...", "loading");
            success = await tryFetch(proxies[1] + encodeURIComponent(fullTarget), true);
        }

        if (!success) {
            showMsg("所有请求通道均超时或受限，请在几分钟后重试，或检查网络连接。", "error");
        }
        btn.disabled = false;
    };

    async function tryFetch(url, isJsonWrap = false) {
        try {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 10000); // 10秒超时

            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);

            let result;
            if (isJsonWrap) {
                const json = await response.json();
                result = json.contents; // allorigins 包装在 contents 里
            } else {
                result = await response.text();
            }

            if (response.ok) {
                showMsg("注册操作完成！响应内容：" + result, "success");
                return true;
            }
        } catch (err) {
            console.warn("当前通道失败:", err);
        }
        return false;
    }

    function showMsg(text, type) {
        statusDiv.innerText = text;
        statusDiv.className = type;
    }
</script>

</body>
</html>
