<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playsis 2502 账号注册</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 6px; padding-left: 4px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d6; border-radius: 12px; box-sizing: border-box; font-size: 16px; transition: all 0.2s; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .hint { font-size: 11px; color: #aeaeb2; margin-top: 5px; display: block; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #c7c7cc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500; min-height: 24px; word-break: break-all; }
        .success { color: #34c759; }
        .error { color: #ff3b30; }
        .loading { color: #007aff; }
    </style>
</head>
<body>

<div class="card">
    <h2>用户注册</h2>
    <form id="regForm">
        <div class="form-group">
            <label>用户 ID (必须是8位数字)</label>
            <input type="text" id="reguid" maxlength="8" placeholder="例如: 21114098" required 
                   oninput="value=value.replace(/[^\d]/g,'')">
            <span class="hint">请输入 8 位纯数字 ID</span>
        </div>

        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="regusername" placeholder="你的名字" required>
        </div>

        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regpassword" placeholder="请输入密码" required>
        </div>

        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmPass" placeholder="请再次输入密码" required>
        </div>

        <button type="submit" id="submitBtn">立即提交注册</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const form = document.getElementById('regForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.onsubmit = async (e) => {
        e.preventDefault();

        // 1. 获取输入值
        const reguid = document.getElementById('reguid').value;
        const regusername = document.getElementById('regusername').value;
        const regpassword = document.getElementById('regpassword').value;
        const confirmPass = document.getElementById('confirmPass').value;

        // 2. 基础校验
        if (reguid.length !== 8) {
            updateStatus("错误：ID 必须正好是 8 位数字", "error");
            return;
        }
        if (regpassword !== confirmPass) {
            updateStatus("错误：两次密码不一致", "error");
            return;
        }

        updateStatus("正在通过中转站注册...", "loading");
        submitBtn.disabled = true;

        // 3. 构造请求参数
        const adminUid = "21114044";
        const adminPass = "huang2006?";
        
        const params = new URLSearchParams({
            uid: adminUid,
            password: adminPass,
            reguid: reguid,
            regpassword: regpassword,
            regusername: regusername
        });

        // 核心改动：引入 CORS 代理中转
        const proxyPrefix = "https://cors-anywhere.azm.workers.dev/";
        const targetUrl = `https://api.eachother.work/PlaysisService/RegisterByAdminRawApi?${params.toString()}`;

        try {
            // 通过代理发送请求，规避跨域限制
            const response = await fetch(proxyPrefix + targetUrl, {
                method: 'GET'
            });

            const resultText = await response.text();

            if (response.ok) {
                // 判断返回内容，根据你的 API 特性调整
                if (resultText.includes("Success") || resultText.includes("成功") || resultText.length < 50) {
                    updateStatus("注册完成！响应：" + resultText, "success");
                } else {
                    updateStatus("响应：" + resultText, "");
                }
            } else {
                updateStatus("服务器响应异常，请检查 ID 是否重复", "error");
            }
        } catch (error) {
            console.error(error);
            updateStatus("网络错误或代理接口受限，请稍后再试", "error");
        } finally {
            submitBtn.disabled = false;
        }
    };

    function updateStatus(text, className) {
        statusDiv.innerText = text;
        statusDiv.className = className;
    }
</script>

</body>
</html>
