<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playsis 注册系统</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --success: #34c759; --error: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 360px; }
        h2 { text-align: center; color: #1c1c1e; margin: 0 0 25px 0; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 5px; padding-left: 4px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d6; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: all 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #c7c7cc; cursor: wait; }
        #status { text-align: center; margin-top: 20px; font-size: 14px; min-height: 40px; padding: 10px; border-radius: 10px; word-break: break-all; }
        .success { background: #e8f5e9; color: var(--success); }
        .error { background: #ffebee; color: var(--error); }
        .loading { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>用户注册</h2>
    <form id="regForm">
        <div class="form-group">
            <label>用户 ID (8位数字)</label>
            <input type="text" id="reguid" maxlength="8" placeholder="例如: 21114098" required oninput="value=value.replace(/[^\d]/g,'')">
        </div>
        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="regusername" placeholder="你的名字" required>
        </div>
        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regpassword" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmPass" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" id="submitBtn">立即注册</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const form = document.getElementById('regForm');
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    form.onsubmit = async (e) => {
        e.preventDefault();
        
        // 1. 获取输入
        const reguid = document.getElementById('reguid').value;
        const regusername = document.getElementById('regusername').value;
        const regpassword = document.getElementById('regpassword').value;
        const confirmPass = document.getElementById('confirmPass').value;

        // 2. 校验
        if (reguid.length !== 8) {
            updateStatus("错误：ID 必须是 8 位数字", "error");
            return;
        }
        if (regpassword !== confirmPass) {
            updateStatus("错误：两次密码输入不一致", "error");
            return;
        }

        // 3. 提交
        btn.disabled = true;
        updateStatus("正在通过云端处理，请稍候...", "loading");

        try {
            // 【重要】请将下方 URL 替换为你 Cloudflare Worker 的真实地址
            const WORKER_URL = "https://playsis.dropkeyboard.workers.dev/";

            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reguid, regusername, regpassword })
            });

            const result = await response.text();

            if (response.ok) {
                updateStatus("注册结果：" + result, "success");
            } else {
                updateStatus("云端响应失败：" + result, "error");
            }
        } catch (error) {
            console.error(error);
            updateStatus("无法连接到云端。请检查 Worker 是否已部署或网络是否正常。", "error");
        } finally {
            btn.disabled = false;
        }
    };

    function updateStatus(text, className) {
        statusDiv.innerText = text;
        statusDiv.className = className;
    }
</script>

</body>
</html>
